<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federal Heart System | Biological AI</title>
    <!-- Modern clean font similar to reference -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    <path d="M2 12h20"></path>
                </svg>
                <span>FEDERAL HEART</span>
            </div>
        </div>
        
        <div class="nav-center">
            <a href="#">Product</a>
            <a href="#">Patient Validation</a>
            <a href="#">Resources</a>
            <a href="#">About</a>
            <a href="#">Diagnostics</a>
        </div>
        
        <div class="nav-right">
            <a href="#" class="btn-primary">Get in touch</a>
            <button class="btn-search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="hero">
        <!-- The container for our Three.js canvas -->
        <div id="canvas-container"></div>
        
        <!-- The Foreground overlay text -->
        <div class="hero-content">
            <h1>Building Biological<br>Artificial Superintelligence</h1>
            <div class="scroll-indicator">
                <div class="mouse">
                    <div class="wheel"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating bottom left icon (like reference) -->
    <div class="floating-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="2" y="7" width="20" height="10" rx="2" ry="2"></rect>
            <path d="M12 11h.01"></path>
        </svg>
    </div>

    <!-- Scripts -->
    <!-- Include Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
    <!-- Include SimplexNoise for natural organic morphing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
